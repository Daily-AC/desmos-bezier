/* =========================================================================
 * Draw-in animation: an overlay <canvas> on top of #calculator sweeps each
 * curve open (De Casteljau split at t=progress, draw the traced-so-far
 * left half) at a true 60fps, then hands off to Desmos with a single
 * setState call once everything is fully drawn.
 *
 * Why not animate through Desmos's own API: measured directly (see
 * segmentLatex's history) -- calculator.setExpressions() has a real,
 * roughly linear cost of ~8-34ms per curve TOUCHED (worse for reveals than
 * for hides, and worse still as more of the scene is already visible), so
 * animating thousands of curves through repeated Desmos calls is bounded
 * by an external per-touch cost no scheduling trick beats. The canvas has
 * no such per-item API cost -- redrawing several thousand cubic strokes a
 * frame is trivial 2D canvas work -- so the sweep happens entirely
 * client-side, and Desmos is only touched ONCE at the very end (a bulk
 * setState, the same operation render() already uses to load the hidden
 * curves, measured at roughly 0.5-3s even for 3000+ curves).
 *
 * Math -> pixel mapping is re-queried every frame via
 * calculator.graphpaperBounds (confirmed live: pixelCoordinates share the
 * same top-left origin as #calculator's own inset:0 box, so the overlay
 * canvas -- positioned the same way -- needs no extra offset), so
 * panning/zooming mid-animation keeps the sweeping strokes glued to the
 * graph instead of drifting.
 * ========================================================================= */
const STATS_SEP = '   ';
const SWEEP_TOTAL_TARGET_MS = 8000; // spreads curve START times across ~8s, independent of curve count
const SWEEP_INTERVAL_FLOOR_MS = 2;
const SWEEP_INTERVAL_CEILING_MS = 40;
const SWEEP_DURATION_MS = 400; // how long one curve takes to trace from empty to full, at 1x speed
const FILL_PHASE_TOTAL_MS = 2000; // second phase, after line work finishes: fills pop in one region at a time, top-to-bottom
const MAX_FRAME_DT_MS = 50; // clamp a slow/delayed frame's contribution to the virtual clock -- see step()'s comment
const FOURIER_FEATURED_COUNT = 5; // top-K longest paths get the full epicycle chain shown; see brief "最长3-5条"
const FOURIER_FEATURED_SLOT_MS = 1600; // each featured path's full spin+trace duration, at 1x speed -- 5*1600=8000ms lines up with SWEEP_TOTAL_TARGET_MS

let drawRafId = null;
let drawGeneration = 0;
let lastStatsHtml = '';
let currentCurveCount = 0; // set at the end of each successful render()
let currentMathBeziers = []; // this render's curves in MATH coords (y already flipped), top-to-bottom order -- what the overlay sweeps
let currentFillPolygons = []; // this render's fill polygons in MATH coords (y already flipped); not swept by the overlay, pop in with the final commit
let currentFillOpacity = '0.9'; // set per-render; '1' in fine-fill mode, '0.9' standard (string: Desmos setState requirement)
let currentCurveColors = []; // parallel to currentMathBeziers; per-path sampled ink in fine mode, empty -> CURVE_COLOR
let speedMultiplier = 1; // live-adjustable via the 绘制速度 slider; scales the virtual animation clock, not wall-clock time directly

// Fourier-mode animation state, parallel to currentMathBeziers/currentCurveCount
// above. Each entry: {dc, harmonics, tMax, arcLen, samples} in MATH coords
// (y already flipped via flipHarmonicsY) -- samples is a precomputed dense
// reconstruction (t in [0, tMax]) used both for the ink-trace reveal and the
// (rare) fallback of a path with zero surviving harmonics.
let currentFourierPaths = [];
const FOURIER_SAMPLE_COUNT = 240; // ink-trace resolution per path, independent of harmonic count

const drawOverlay = document.getElementById('drawOverlay');
const overlayCtx = drawOverlay.getContext('2d');

function resizeOverlayToCalculator() {
  const rect = calculatorEl.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(rect.width * dpr));
  const h = Math.max(1, Math.round(rect.height * dpr));
  if (drawOverlay.width !== w || drawOverlay.height !== h) {
    drawOverlay.width = w;
    drawOverlay.height = h;
  }
  overlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function lerp2(a, b, t) {
  return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
}

// De Casteljau subdivision at parameter t: returns just the "already drawn"
// left sub-curve (from 0 to t), which is itself a valid cubic Bezier.
function deCasteljauLeft(bez, t) {
  const [p0, p1, p2, p3] = bez;
  const q1 = lerp2(p0, p1, t);
  const a = lerp2(p1, p2, t);
  const q2 = lerp2(q1, a, t);
  const r2 = lerp2(p2, p3, t);
  const r1 = lerp2(a, r2, t);
  const q3 = lerp2(q2, r1, t);
  return [p0, q1, q2, q3];
}

function mathToPixel(mx, my, bounds) {
  const mc = bounds.mathCoordinates, pc = bounds.pixelCoordinates;
  return [
    pc.left + ((mx - mc.left) / mc.width) * pc.width,
    pc.top + ((mc.top - my) / mc.height) * pc.height,
  ];
}

function cancelDrawAnimation() {
  drawGeneration++;
  if (drawRafId !== null) {
    cancelAnimationFrame(drawRafId);
    drawRafId = null;
  }
  drawOverlay.style.display = 'none';
  if (drawOverlay.width && drawOverlay.height) overlayCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
}

function startDrawAnimation() {
  cancelDrawAnimation();
  if (!calculator || currentCurveCount === 0 || currentMathBeziers.length === 0) return;
  const myGen = drawGeneration;
  const n = currentCurveCount;
  const interval = Math.max(SWEEP_INTERVAL_FLOOR_MS, Math.min(SWEEP_INTERVAL_CEILING_MS, SWEEP_TOTAL_TARGET_MS / n));
  const lineTimelineMs = (n - 1) * interval + SWEEP_DURATION_MS;

  // Second phase: fills pop in one region at a time (no natural "sweep"
  // parameter for an arbitrary polygon the way De Casteljau splitting gives
  // curves, so each region just appears whole at its scheduled moment,
  // spread evenly across FILL_PHASE_TOTAL_MS). Zero fills -> zero extra
  // phase length, so a no-fill render (toggle off, or a B&W image) reaches
  // the final commit at exactly the same time as before this feature
  // existed -- no added wait for content that isn't there.
  const numFills = currentFillPolygons.length;
  const fillPhaseMs = numFills > 0 ? FILL_PHASE_TOTAL_MS : 0;
  const fillInterval = numFills > 0 ? fillPhaseMs / numFills : 0;
  const grandTotalMs = lineTimelineMs + fillPhaseMs;

  resizeOverlayToCalculator();
  drawOverlay.style.display = 'block';

  let lastFrameTime = performance.now();
  let animElapsedMs = 0;

  function step() {
    if (myGen !== drawGeneration) return; // superseded by a re-render or replay

    // Virtual clock: real time advances at speedMultiplier's rate. Changing
    // the slider mid-run just changes how fast animElapsedMs accumulates
    // from here on -- no restart, no jump, no recomputing from a fixed
    // start time and multiplier (which would snap progress on a speed
    // change instead of continuing smoothly from wherever it was).
    //
    // Sample performance.now() directly rather than trusting rAF's own
    // timestamp argument: measured directly in this environment, that
    // argument can drift behind real wall-clock time as the callback rate
    // rises (confirmed live -- the gap between the two grew from under
    // 1ms up to ~17ms across just 15 frames), which silently under-counts
    // dt and was making the whole animation run ~4x slower than intended
    // (3116-curve run measured at 33s instead of the intended ~8s).
    //
    // dt is also clamped: the very first tick after the heavy setState
    // that just loaded thousands of hidden curves can land noticeably
    // late (residual Desmos-internal work delaying the next paint), which
    // otherwise dumps that whole real-world gap into animElapsedMs in one
    // step -- reproduced during testing as the entire 1049-curve animation
    // completing within the first ~50ms instead of over ~8s. Capping dt
    // means a slow frame just costs a brief real-time pause, never skips
    // the virtual clock ahead.
    const now = performance.now();
    const dt = Math.min(now - lastFrameTime, MAX_FRAME_DT_MS);
    lastFrameTime = now;
    animElapsedMs += dt * speedMultiplier;

    resizeOverlayToCalculator(); // cheap no-op unless the window was resized
    const bounds = calculator.graphpaperBounds;
    overlayCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);

    // Fills first (drawn under), matching the same before-the-curves
    // ordering used in the real Desmos expression list. Each region pops
    // in whole -- there's no De Casteljau-style partial-fill parameter for
    // an arbitrary polygon -- fillElapsedMs only advances once the line
    // phase is done, so line work stays the sole focus until it's complete.
    const fillElapsedMs = animElapsedMs - lineTimelineMs;
    if (numFills > 0 && fillElapsedMs > 0) {
      const fillsRevealed = Math.min(numFills, Math.floor(fillElapsedMs / fillInterval) + 1);
      overlayCtx.globalAlpha = parseFloat(currentFillOpacity); // must match the fillOpacity emitted to Desmos, or the commit handoff will visibly jump
      for (let i = 0; i < fillsRevealed; i++) {
        const poly = currentFillPolygons[i];
        const pts = poly.points.map((p) => mathToPixel(p[0], p[1], bounds));
        overlayCtx.fillStyle = poly.color;
        overlayCtx.beginPath();
        overlayCtx.moveTo(pts[0][0], pts[0][1]);
        for (let k = 1; k < pts.length; k++) overlayCtx.lineTo(pts[k][0], pts[k][1]);
        overlayCtx.closePath();
        overlayCtx.fill();
      }
      overlayCtx.globalAlpha = 1;
    }

    // Curves on top, held fully drawn once the line phase itself is done
    // (clamping p at 1) so they stay visible and complete throughout the
    // whole fill phase rather than re-animating or disappearing.
    overlayCtx.strokeStyle = CURVE_COLOR;
    overlayCtx.lineWidth = currentCurveColors.length ? 1.75 : 2.5; // must match the Desmos lineWidth emitted below
    overlayCtx.lineCap = 'round';
    overlayCtx.lineJoin = 'round';
    for (let i = 0; i < n; i++) {
      const s = i * interval;
      const p = Math.max(0, Math.min(1, (animElapsedMs - s) / SWEEP_DURATION_MS));
      if (p <= 0) continue;
      overlayCtx.strokeStyle = currentCurveColors[i] || CURVE_COLOR;
      const bez = currentMathBeziers[i];
      const drawnBez = p >= 1 ? bez : deCasteljauLeft(bez, p);
      const sp0 = mathToPixel(drawnBez[0][0], drawnBez[0][1], bounds);
      const sp1 = mathToPixel(drawnBez[1][0], drawnBez[1][1], bounds);
      const sp2 = mathToPixel(drawnBez[2][0], drawnBez[2][1], bounds);
      const sp3 = mathToPixel(drawnBez[3][0], drawnBez[3][1], bounds);
      overlayCtx.beginPath();
      overlayCtx.moveTo(sp0[0], sp0[1]);
      overlayCtx.bezierCurveTo(sp1[0], sp1[1], sp2[0], sp2[1], sp3[0], sp3[1]);
      overlayCtx.stroke();
    }

    const pct = Math.floor(Math.min(100, (animElapsedMs / grandTotalMs) * 100));
    statsEl.innerHTML = lastStatsHtml + STATS_SEP + '[>] 绘制中… ' + pct + '%';

    if (animElapsedMs < grandTotalMs) {
      drawRafId = requestAnimationFrame(step);
    } else {
      // Final commit: bulk-unhide every curve (and every fill polygon, which
      // the overlay never animates -- they simply pop in here) in ONE
      // setState call, the same bulk operation render() already relies on.
      // By now the overlay is already showing the complete picture, so
      // however long this call takes (measured ~0.5-3s even at 3000+
      // curves), there is nothing left to visually change -- the overlay
      // masks the hitch until the instant it's hidden, right after the
      // call returns. Fills stay first in the list so they render under
      // the curves, matching render()'s own ordering.
      const finalFillExpressions = currentFillPolygons.map((poly, i) => ({
        id: 'fill-' + i,
        type: 'expression',
        color: poly.color,
        fillOpacity: currentFillOpacity, // setState (unlike setExpressions) requires this as a string -- confirmed live, a raw number throws "parse can only be called with strings"
        lineOpacity: currentFillOpacity === '1' ? '1' : '0', // fine mode: self-colored border seals hairline cracks between adjacent quantized regions
        lineWidth: '2.5',
        hidden: false,
        latex: '\\operatorname{polygon}\\left(' + poly.points.map((p) => '\\left(' + fmtNum(p[0]) + ',' + fmtNum(p[1]) + '\\right)').join(',') + '\\right)',
      }));
      const finalExpressions = currentMathBeziers.map((bez, i) => ({
        id: 'bez-' + i,
        type: 'expression',
        color: currentCurveColors[i] || CURVE_COLOR,
        lineWidth: currentCurveColors.length ? '1.75' : undefined,
        hidden: false,
        latex: segmentLatex(bez[0], bez[1], bez[2], bez[3]),
      }));
      const commitStart = performance.now();
      const state = calculator.getState();
      state.expressions.list = finalFillExpressions.concat(finalExpressions);
      calculator.setState(state);
      window.__lastCommitMs = Math.round(performance.now() - commitStart); // read by tests/instrumentation only
      drawRafId = null;

      // Paint barrier: setState RETURNING does not mean Desmos has PAINTED —
      // its rendering is async, and with thousands of curves (worse at dpr=2)
      // the gap is user-visible: hiding the overlay here used to expose a
      // blank/partial graph for a beat before the finished piece popped in
      // ("clear screen, then re-show the result"). Keep the overlay's final
      // complete frame up until Desmos reports a finished render pass
      // (asyncScreenshot's callback fires after one), plus two rAFs so the
      // painted frame is actually presented; a timer is the fallback in case
      // the callback never fires.
      let overlayReleased = false;
      const releaseOverlay = () => {
        if (overlayReleased || myGen !== drawGeneration) return;
        overlayReleased = true;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (myGen !== drawGeneration) return;
          drawOverlay.style.display = 'none';
          overlayCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
          statsEl.innerHTML = lastStatsHtml;
        }));
      };
      // asyncScreenshot's callback never fires in this embed (verified live —
      // times out with and without opts, and each call emits an extra console
      // warning), so a deterministic paint event is unavailable. Adaptive
      // grace instead: paint cost scales with what setState itself cost, so
      // wait 4× the measured commit time (floor 1.5s). Over-waiting is free —
      // the overlay is already showing the identical finished picture.
      const graceMs = Math.max(1500, window.__lastCommitMs * 4);
      window.__lastPaintBarrier = 'adaptive-' + graceMs + 'ms';
      setTimeout(releaseOverlay, graceMs);
    }
  }
  drawRafId = requestAnimationFrame(step);
}

/* =========================================================================
 * Fourier-mode draw-in animation: same overlay canvas, same generation-token
 * cancellation, same fills-then-lines-then-bulk-reveal shape as
 * startDrawAnimation above, but a different per-frame drawing routine --
 * epicycle chains (rotating vector circles) for the top FOURIER_FEATURED_COUNT
 * longest paths, plain ink-trace reveal for the rest (brief: "最长3-5条路径
 * 完整展示本轮系,其余路径加速批量画...只画笔迹不画圆圈"). Kept as a fully separate
 * function (not merged into startDrawAnimation via branches) so the
 * already-verified Bezier animation path is untouched by this feature --
 * zero regression risk on the default mode.
 * ========================================================================= */

function drawFourierInkTrace(fp, bounds, progress) {
  const samples = fp.samples;
  const revealCount = Math.max(1, Math.min(samples.length, Math.round(progress * (samples.length - 1)) + 1));
  overlayCtx.strokeStyle = CURVE_COLOR;
  overlayCtx.lineWidth = 2.5;
  overlayCtx.beginPath();
  for (let i = 0; i < revealCount; i++) {
    const [px, py] = mathToPixel(samples[i][0], samples[i][1], bounds);
    if (i === 0) overlayCtx.moveTo(px, py); else overlayCtx.lineTo(px, py);
  }
  overlayCtx.stroke();
}

// Circles map to circles in pixel space only because aspectCorrectViewport
// (see render()/renderToDesmos) guarantees the math-to-pixel scale is
// uniform in x and y -- otherwise a math-space radius would need separate
// x/y pixel radii (an ellipse).
function drawEpicycleChain(fp, bounds, t) {
  const scale = bounds.pixelCoordinates.width / bounds.mathCoordinates.width;
  const { segments } = epicycleChain(fp.dc, fp.harmonics, t);
  overlayCtx.lineWidth = 1;
  overlayCtx.strokeStyle = 'rgba(45,112,179,0.32)';
  for (const seg of segments) {
    const [ccx, ccy] = mathToPixel(seg.centerX, seg.centerY, bounds);
    const [tx, ty] = mathToPixel(seg.tipX, seg.tipY, bounds);
    const pr = Math.abs(seg.r) * scale;
    overlayCtx.beginPath();
    overlayCtx.arc(ccx, ccy, pr, 0, Math.PI * 2);
    overlayCtx.stroke();
    overlayCtx.beginPath();
    overlayCtx.moveTo(ccx, ccy);
    overlayCtx.lineTo(tx, ty);
    overlayCtx.stroke();
  }
  if (segments.length) {
    const last = segments[segments.length - 1];
    const [tx, ty] = mathToPixel(last.tipX, last.tipY, bounds);
    overlayCtx.fillStyle = CURVE_COLOR;
    overlayCtx.beginPath();
    overlayCtx.arc(tx, ty, 3, 0, Math.PI * 2);
    overlayCtx.fill();
  }
}

function startFourierDrawAnimation() {
  cancelDrawAnimation();
  if (!calculator || currentFourierPaths.length === 0) return;
  const myGen = drawGeneration;
  const paths = currentFourierPaths;

  // Longest-arc-length-first selection: top K get the full epicycle chain
  // ("featured", drawn sequentially so each one's spin is legible), the rest
  // trace ink-only, staggered concurrently across roughly the same window
  // (brief: "可多条并行,只画笔迹不画圆圈").
  const order = paths.map((_, i) => i).sort((a, b) => paths[b].arcLen - paths[a].arcLen);
  const featuredIdx = order.slice(0, Math.min(order.length, FOURIER_FEATURED_COUNT));
  const batchIdx = order.slice(featuredIdx.length);
  const featuredTotalMs = featuredIdx.length * FOURIER_FEATURED_SLOT_MS;
  const batchTarget = Math.max(featuredTotalMs, SWEEP_TOTAL_TARGET_MS);
  const batchCount = batchIdx.length;
  const batchInterval = batchCount > 0
    ? Math.max(SWEEP_INTERVAL_FLOOR_MS, Math.min(SWEEP_INTERVAL_CEILING_MS, batchTarget / batchCount))
    : 0;
  const batchTimelineMs = batchCount > 0 ? (batchCount - 1) * batchInterval + SWEEP_DURATION_MS : 0;
  const lineTimelineMs = Math.max(featuredTotalMs, batchTimelineMs, 1);

  const numFills = currentFillPolygons.length;
  const fillPhaseMs = numFills > 0 ? FILL_PHASE_TOTAL_MS : 0;
  const fillInterval = numFills > 0 ? fillPhaseMs / numFills : 0;
  const grandTotalMs = lineTimelineMs + fillPhaseMs;

  resizeOverlayToCalculator();
  drawOverlay.style.display = 'block';

  let lastFrameTime = performance.now();
  let animElapsedMs = 0;

  function step() {
    if (myGen !== drawGeneration) return;
    const now = performance.now();
    const dt = Math.min(now - lastFrameTime, MAX_FRAME_DT_MS);
    lastFrameTime = now;
    animElapsedMs += dt * speedMultiplier;

    resizeOverlayToCalculator();
    const bounds = calculator.graphpaperBounds;
    overlayCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);

    // Fills phase: identical shape to startDrawAnimation's (same shared
    // currentFillPolygons, same constants) -- fills are common to both modes.
    const fillElapsedMs = animElapsedMs - lineTimelineMs;
    if (numFills > 0 && fillElapsedMs > 0) {
      const fillsRevealed = Math.min(numFills, Math.floor(fillElapsedMs / fillInterval) + 1);
      overlayCtx.globalAlpha = 0.9;
      for (let i = 0; i < fillsRevealed; i++) {
        const poly = currentFillPolygons[i];
        const pts = poly.points.map((p) => mathToPixel(p[0], p[1], bounds));
        overlayCtx.fillStyle = poly.color;
        overlayCtx.beginPath();
        overlayCtx.moveTo(pts[0][0], pts[0][1]);
        for (let k = 1; k < pts.length; k++) overlayCtx.lineTo(pts[k][0], pts[k][1]);
        overlayCtx.closePath();
        overlayCtx.fill();
      }
      overlayCtx.globalAlpha = 1;
    }

    overlayCtx.lineCap = 'round';
    overlayCtx.lineJoin = 'round';

    // Featured paths: sequential slots, full epicycle chain while actively
    // spinning, ink held complete once its slot finishes.
    for (let fi = 0; fi < featuredIdx.length; fi++) {
      const fp = paths[featuredIdx[fi]];
      const winStart = fi * FOURIER_FEATURED_SLOT_MS;
      const p = Math.max(0, Math.min(1, (animElapsedMs - winStart) / FOURIER_FEATURED_SLOT_MS));
      if (p <= 0) continue;
      drawFourierInkTrace(fp, bounds, p);
      if (p < 1) drawEpicycleChain(fp, bounds, p * fp.tMax);
    }

    // Batch paths: ink-only, staggered concurrently.
    for (let bi = 0; bi < batchIdx.length; bi++) {
      const fp = paths[batchIdx[bi]];
      const start = bi * batchInterval;
      const p = Math.max(0, Math.min(1, (animElapsedMs - start) / SWEEP_DURATION_MS));
      if (p <= 0) continue;
      drawFourierInkTrace(fp, bounds, p);
    }

    const pct = Math.floor(Math.min(100, (animElapsedMs / grandTotalMs) * 100));
    statsEl.innerHTML = lastStatsHtml + STATS_SEP + '[>] 绘制中… ' + pct + '%';

    if (animElapsedMs < grandTotalMs) {
      drawRafId = requestAnimationFrame(step);
    } else {
      // Final commit: bulk-unhide, same "overlay already shows the finished
      // picture, so however long setState takes is invisible" pattern as
      // startDrawAnimation's finale (duplicated rather than shared so this
      // new code path can never perturb the already-verified Bezier one).
      const finalFillExpressions = currentFillPolygons.map((poly, i) => ({
        id: 'fill-' + i,
        type: 'expression',
        color: poly.color,
        fillOpacity: currentFillOpacity,
        lineOpacity: currentFillOpacity === '1' ? '1' : '0', // fine mode: self-colored border seals hairline cracks between adjacent quantized regions
        lineWidth: '2.5',
        hidden: false,
        latex: '\\operatorname{polygon}\\left(' + poly.points.map((p) => '\\left(' + fmtNum(p[0]) + ',' + fmtNum(p[1]) + '\\right)').join(',') + '\\right)',
      }));
      const finalExpressions = paths.map((fp, i) => ({
        id: 'four-' + i,
        type: 'expression',
        color: CURVE_COLOR,
        hidden: false,
        latex: fourierPathLatex(fp.dc, fp.harmonics),
      }));
      const commitStart = performance.now();
      const state = calculator.getState();
      state.expressions.list = finalFillExpressions.concat(finalExpressions);
      calculator.setState(state);
      window.__lastCommitMs = Math.round(performance.now() - commitStart);
      drawRafId = null;

      let overlayReleased = false;
      const releaseOverlay = () => {
        if (overlayReleased || myGen !== drawGeneration) return;
        overlayReleased = true;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (myGen !== drawGeneration) return;
          drawOverlay.style.display = 'none';
          overlayCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
          statsEl.innerHTML = lastStatsHtml;
        }));
      };
      const graceMs = Math.max(1500, window.__lastCommitMs * 4);
      window.__lastPaintBarrier = 'adaptive-' + graceMs + 'ms';
      setTimeout(releaseOverlay, graceMs);
    }
  }
  drawRafId = requestAnimationFrame(step);
}

drawBtn.addEventListener('click', () => {
  if (fourierMode) startFourierDrawAnimation(); else startDrawAnimation();
});
let isRendering = false;

function yieldToUI() {
  return new Promise((resolve) => requestAnimationFrame(() => resolve()));
}

thresholdSlider.addEventListener('input', () => { thresholdVal.textContent = thresholdSlider.value; });
toleranceSlider.addEventListener('input', () => { toleranceVal.textContent = Number(toleranceSlider.value).toFixed(1); });
harmonicsSlider.addEventListener('input', () => { harmonicsVal.textContent = harmonicsSlider.value; });
maxCurvesSlider.addEventListener('input', () => { maxCurvesVal.textContent = maxCurvesSlider.value; });
speedSlider.addEventListener('input', () => {
  speedMultiplier = Number(speedSlider.value);
  speedVal.textContent = speedMultiplier.toFixed(1);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files && fileInput.files[0]) handleFile(fileInput.files[0]);
});

renderBtn.addEventListener('click', () => { render(); });

let dragDepth = 0;
window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragDepth++;
  document.body.classList.add('dragging');
});
window.addEventListener('dragover', (e) => { e.preventDefault(); });
window.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) document.body.classList.remove('dragging');
});
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove('dragging');
  const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function loadImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!file.type || file.type.indexOf('image/') !== 0) {
      reject(new Error('Not an image file'));
      return;
    }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to decode image')); };
    img.src = url;
  });
}

async function handleFile(file) {
  statsEl.classList.remove('err');
  statsEl.textContent = '[+] 加载图片中…';
  try {
    const img = await loadImageFile(file);
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w === 0 || h === 0) throw new Error('Image has no pixels');
    const maxDim = Math.max(w, h);
    let upscaled = false;
    if (maxDim > 1000) {
      const scale = 1000 / maxDim;
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));
    } else if (maxDim < 500) {
      upscaled = true;
      // Tiny sources (small downloaded portraits): upscale so edge tracing and
      // fill boundaries work at sub-source-pixel smoothness instead of
      // staircasing. Gate at 500 keeps every existing test asset (>=600px)
      // byte-identical through the pipeline.
      const scale = 900 / maxDim;
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));
    }
    const off = document.createElement('canvas');
    off.width = w; off.height = h;
    const octx = off.getContext('2d');
    if (upscaled) {
      // High-quality resampling ONLY for the upscale branch. Setting it
      // unconditionally changes the downscale path's pixel output and shifted
      // every baseline curve count (caught by the regression suite) -- the
      // browser default ('low') is part of the pipeline's frozen behavior.
      octx.imageSmoothingEnabled = true;
      octx.imageSmoothingQuality = 'high';
    }
    octx.drawImage(img, 0, 0, w, h);
    currentImageData = octx.getImageData(0, 0, w, h);
    sourceCanvas.width = w;
    sourceCanvas.height = h;
    sourceCanvas.getContext('2d').drawImage(off, 0, 0);
    sourceSection.hidden = false;
    previewWrap.hidden = false;
    renderBtn.disabled = false;
    await render();
  } catch (err) {
    console.error(err);
    statsEl.classList.add('err');
    statsEl.textContent = '[x] 加载图片出错: ' + err.message;
  }
}

function drawPreview(beziers, width, height) {
  previewCanvas.width = width;
  previewCanvas.height = height;
  const ctx = previewCanvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);
  ctx.strokeStyle = CURVE_COLOR;
  ctx.lineWidth = Math.max(1, Math.min(width, height) / 400);
  ctx.beginPath();
  for (const bez of beziers) {
    ctx.moveTo(bez[0][0], bez[0][1]);
    ctx.bezierCurveTo(bez[1][0], bez[1][1], bez[2][0], bez[2][1], bez[3][0], bez[3][1]);
  }
  ctx.stroke();
}

// Fourier-mode counterpart of drawPreview: draws the reconstructed curves
// (dense samples precomputed in render()) into #previewCanvas. Used both for
// the normal collapsible "图 2. 拟合曲线" panel AND, unchanged, for the
// Desmos-load-failure degrade mode (showDesmosFailureNotice just resizes/
// expands the same canvas -- this function doesn't know or care which case
// it's in, matching drawPreview's existing behavior for Bezier mode).
// fp.samples are stored in MATH space (y-up, see flipHarmonicsY); flipping
// back once here (the transform is its own inverse) gives plain image-pixel
// space for this y-down 2D canvas -- exactly mirroring how drawPreview
// consumes `allBeziers` in its original, pre-flip pixel space.
function drawFourierPreview(fourierPaths, width, height) {
  previewCanvas.width = width;
  previewCanvas.height = height;
  const ctx = previewCanvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);
  ctx.strokeStyle = CURVE_COLOR;
  ctx.lineWidth = Math.max(1, Math.min(width, height) / 400);
  ctx.beginPath();
  for (const fp of fourierPaths) {
    const pts = fp.samples;
    if (pts.length === 0) continue;
    ctx.moveTo(pts[0][0], height - pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], height - pts[i][1]);
  }
  ctx.stroke();
}

// Desmos does NOT keep x/y scales equal: forcing the raw image bounds into a
// graph paper of a different pixel aspect squashes the drawing (tall image in
// a wide window renders vertically compressed / "fat"). Expand ONE math axis
// (never shrink) so the viewport aspect matches the graph paper pixel aspect.
function aspectCorrectViewport(viewport) {
  try {
    const pc = calculator.graphpaperBounds.pixelCoordinates;
    if (!pc || !pc.width || !pc.height) return viewport;
    const pAspect = pc.width / pc.height;
    let { left, right, bottom, top } = viewport;
    const mw = right - left, mh = top - bottom;
    if (mw / mh < pAspect) {
      const nw = mh * pAspect, cx = (left + right) / 2;
      left = cx - nw / 2; right = cx + nw / 2;
    } else {
      const nh = mw / pAspect, cy = (top + bottom) / 2;
      bottom = cy - nh / 2; top = cy + nh / 2;
    }
    return { left, right, bottom, top };
  } catch (e) {
    return viewport;
  }
}

function renderToDesmos(expressions, viewport) {
  const vp = aspectCorrectViewport(viewport);
  const state = calculator.getState();
  state.expressions.list = expressions;
  state.graph = state.graph || {};
  state.graph.viewport = vp;
  calculator.setState(state);
  // Desmos's initial layout pass clobbers the viewport if setState runs
  // before the first layout settles (fresh page + immediate render), so
  // pin it explicitly, and once more after the layout pass (re-correct with
  // the settled graph paper aspect, which may differ pre-layout).
  calculator.setMathBounds(vp);
  setTimeout(() => calculator.setMathBounds(aspectCorrectViewport(viewport)), 400);
}

async function render() {
  if (!currentImageData || isRendering) return;
  isRendering = true;
  renderBtn.disabled = true;
  drawBtn.disabled = true;
  cancelDrawAnimation(); // a fresh render replaces the whole curve set — any in-flight draw-in is now stale
  const t0 = performance.now();
  statsEl.classList.remove('err');
  statsEl.textContent = '[+] 处理中…';
  try {
    const { width, height, data } = currentImageData;
    const high = Number(thresholdSlider.value);
    const low = high * 0.4;
    const maxError = Number(toleranceSlider.value);
    const maxCurves = Number(maxCurvesSlider.value);
    const harmonicCount = Number(harmonicsSlider.value);

    await yieldToUI();
    const gray = toGrayscale(data, width, height);
    await yieldToUI();
    const blurred = gaussianBlur5(gray, width, height);
    await yieldToUI();
    const sobelRes = sobel(blurred, width, height);
    await yieldToUI();
    const nms = nonMaxSuppression(sobelRes.mag, sobelRes.dir, width, height);
    await yieldToUI();
    const edgeRaw = doubleThresholdHysteresis(nms, width, height, high, low);
    await yieldToUI();
    const edge = guoHallThin(edgeRaw, width, height);
    await yieldToUI();

    let edgeCount = 0;
    for (let i = 0; i < edge.length; i++) if (edge[i] === 255) edgeCount++;

    // Trace with a low internal threshold so short-but-real fragments survive
    // to be gap-linked, then apply the real minimum length after linking —
    // otherwise minLength=8 would discard exactly the tiny pieces gap-linking
    // needs to reassemble into a full contour. Tracing, linking, and the
    // length filter together cost single-digit milliseconds even on a dense
    // 1000px image (profiled), so they share one yield rather than each
    // paying rAF's per-call latency for negligible chunking benefit.
    const rawPaths = traceContours(edge, width, height, 1);
    // gap/angle/minLength retuned after switching to sub-pixel NMS: the old
    // values (20, 35, 8) were tuned against quantized-NMS fragmentation and
    // over-linked/over-kept short pieces once the edge map itself became far
    // less fragmented (demo-dragon-v2: 4838 connected components -> 131).
    const linkedPaths = linkPathGaps(rawPaths, 10, 30, width, height);
    function pathArcLength(p) {
      let l = 0;
      for (let i = 1; i < p.length; i++) l += Math.hypot(p[i][0] - p[i - 1][0], p[i][1] - p[i - 1][1]);
      return l;
    }
    const paths = linkedPaths.filter((p) => pathArcLength(p) >= 30);
    await yieldToUI();

    // Branch point (brief: "傅里叶分叉在轮廓追踪+桥接后的像素级路径"): `paths` above
    // is shared by both modes unchanged. Bezier does RDP simplify + Schneider
    // fitCurve on it (unchanged from before this feature existed); Fourier
    // resamples the DENSE pre-RDP points directly (RDP's sparse vertices
    // would starve uniform arc-length resampling of real detail). Declared
    // here so both branches can populate them and the shared tail below
    // (fill pipeline, preview, Desmos push, stats, animation trigger) can
    // read whichever one applies.
    let allBeziers = [];
    let capped = false;
    let expressions = [];
    let fourierHarmonicTotal = 0;

    if (!fourierMode) {
      let lastYield = performance.now();
      let bezColors = []; // parallel to allBeziers; per-path sampled ink in fine mode
      outer:
      for (let pi = 0; pi < paths.length; pi++) {
        if (allBeziers.length >= maxCurves) break;
        const simplified = rdpSimplify(paths[pi], 0.8);
        if (simplified.length >= 2) {
          const pathColor = fineFillEnabled ? sampleLineColor(paths[pi], data, width) : CURVE_COLOR;
          const beziers = fitCurve(simplified, maxError);
          for (const b of beziers) {
            allBeziers.push(b);
            bezColors.push(pathColor);
            if (allBeziers.length >= maxCurves) break outer;
          }
        }
        if (performance.now() - lastYield > 40) {
          await yieldToUI();
          lastYield = performance.now();
        }
      }
      capped = allBeziers.length >= maxCurves && paths.length > 0;

      // Draw-in animation flows top to bottom: order curves by their topmost
      // control point (Bezier's convex-hull property means the curve itself
      // never rises above the min-y of its own control points, so this is a
      // safe, cheap ordering key without sampling the curve). Order only
      // affects animation sequencing, not the static final picture.
      const order = allBeziers.map((_, i) => i).sort((ia, ib) => {
        const a = allBeziers[ia], b = allBeziers[ib];
        const topA = Math.min(a[0][1], a[1][1], a[2][1], a[3][1]);
        const topB = Math.min(b[0][1], b[1][1], b[2][1], b[3][1]);
        return topA - topB;
      });
      allBeziers = order.map((i) => allBeziers[i]);
      bezColors = order.map((i) => bezColors[i]);
      // Only fine mode publishes per-curve colors; standard mode leaves this
      // empty so every consumer (overlay stroke, final commit, lineWidth
      // gates) falls back to the original CURVE_COLOR/2.5 behavior.
      currentCurveColors = fineFillEnabled ? bezColors : [];

      // Flip y (image coords -> math coords) so the drawing is upright in
      // Desmos. Every curve starts hidden -- the real drawing happens on the
      // canvas overlay (startDrawAnimation), which sweeps currentMathBeziers
      // top-to-bottom (matching the sort above) and only touches Desmos once
      // more, at the very end, to bulk-unhide everything.
      const n = allBeziers.length;
      const mathBeziers = allBeziers.map((bez) => [
        [bez[0][0], height - bez[0][1]],
        [bez[1][0], height - bez[1][1]],
        [bez[2][0], height - bez[2][1]],
        [bez[3][0], height - bez[3][1]],
      ]);
      currentMathBeziers = mathBeziers;
      currentFourierPaths = []; // stale Fourier state from a previous mode must not leak into this render
      expressions = mathBeziers.map((bez, i) => ({
        id: 'bez-' + i,
        type: 'expression',
        color: bezColors[i] || CURVE_COLOR,
        lineWidth: fineFillEnabled ? '1.75' : undefined, // fine: thinner ink so small features (eyes) aren't swallowed; undefined -> Desmos default (standard mode unchanged)
        hidden: true,
        latex: segmentLatex(bez[0], bez[1], bez[2], bez[3]),
      }));
    } else {
      currentMathBeziers = [];
      currentCurveCount = 0; // stale Bezier state from a previous mode must not leak into this render
      currentCurveColors = [];
      // Path-level cap: minLength(30px) already keeps path counts small on
      // every test image (max observed ~86 on demo-dragon-v2), nowhere near
      // where a maxCurves-style cap would matter -- "曲线上限" stays a
      // Bezier-only control (brief only calls out hiding 容差, not repurposing
      // this slider), left visible but inert in Fourier mode.
      const CLOSE_THRESHOLD_FRAC = 0.02; // endpoints within 2% of the path's own arc length (min 4px) count as already closed
      const fourierPaths = [];
      for (const p of paths) {
        const arcLen = pathArcLength(p);
        const closeThresholdPx = Math.max(4, arcLen * CLOSE_THRESHOLD_FRAC);
        const closed = isPathClosed(p, closeThresholdPx);
        const M = chooseResampleCount(arcLen);
        const resampled = resamplePathUniform(p, M);
        const loopPoints = closed ? resampled : mirrorClosePath(resampled);
        const { dc: dcPixel, harmonics: harmonicsPixel } = topHarmonics(complexDFT(loopPoints), harmonicCount);
        // Animation-only cutoff: for a mirrored open path, t in [0, tMax]
        // traces the forward pass once; t in [tMax, 1] retraces it backward
        // over already-drawn ink (brief: avoid drawing it twice). A closed
        // path has no mirrored half, so its whole loop is "new" (tMax=1).
        const tMax = closed ? 1 : M / loopPoints.length;
        // Flip to math space (y-up) once here -- see flipHarmonicsY's
        // derivation comment -- so the Desmos latex, the overlay animation,
        // and the preview canvas all share one MATH-space source of truth,
        // matching how the Bezier branch flips once into currentMathBeziers.
        const { dc, harmonics } = flipHarmonicsY(dcPixel, harmonicsPixel, height);
        const samples = reconstructPath(dc, harmonics, FOURIER_SAMPLE_COUNT, tMax);
        fourierPaths.push({ dc, harmonics, tMax, arcLen, samples });
      }
      currentFourierPaths = fourierPaths;
      fourierHarmonicTotal = fourierPaths.reduce((sum, fp) => sum + fp.harmonics.length, 0);
      expressions = fourierPaths.map((fp, i) => ({
        id: 'four-' + i,
        type: 'expression',
        color: CURVE_COLOR,
        hidden: true,
        latex: fourierPathLatex(fp.dc, fp.harmonics),
      }));
    }

    // Color fill (填色): independent of the edge/curve pipeline above, runs
    // directly on the raw image data. Gated by the toolbar toggle -- when
    // off, fillPolygons stays empty and every downstream step (expressions,
    // stats line, final commit) is identical to the no-fill code path.
    let fillPolygons = [];
    let fillStats = null;
    currentFillOpacity = fineFillEnabled ? '1' : '0.9';
    if (fillEnabled) {
      // Fine params: 32 colors resolves anime shading gradients into cel-like
      // bands (14 crushes them); minArea 14 keeps eyes/small ornaments at
      // portrait scale; whiteThreshold 256 disables whiteness exclusion
      // entirely (background removal is the flood mask's job in fine mode);
      // opacity 1 because posterized portraits need solid coverage -- 0.9
      // leaks the grid through every fill.
      const fillOpts = fineFillEnabled
        ? { fine: true, numColors: 32, minAreaPx: 14, whiteThreshold: 256, blackThreshold: 8, rdpEpsilon: 1.0, maxPolygons: 2000 }
        : {};
      const fillResult = extractFillPolygons(data, width, height, fillOpts);
      fillPolygons = fillResult.polygons;
      fillStats = fillResult.stats;
      // Same top-to-bottom convention as the curve sort above (by topmost
      // point, pre-flip, in image coords) so the fill-in phase flows the
      // same visual direction as the line sweep instead of switching to a
      // different scan order.
      fillPolygons.sort((a, b) => {
        const topA = Math.min(...a.points.map((p) => p[1]));
        const topB = Math.min(...b.points.map((p) => p[1]));
        return topA - topB;
      });
    }
    // Same y-flip as curves; fills share the identical math coordinate space.
    currentFillPolygons = fillPolygons.map((poly) => ({
      color: poly.color,
      points: poly.points.map(([x, y]) => [x, height - y]),
    }));
    // Fill expressions are placed BEFORE the curve expressions in the list --
    // confirmed live that Desmos draws later list entries on top, so this
    // ordering is what keeps fills under the line work, not a cosmetic choice.
    const fillExpressions = currentFillPolygons.map((poly, i) => ({
      id: 'fill-' + i,
      type: 'expression',
      color: poly.color,
      fillOpacity: currentFillOpacity, // setState requires a string here -- see the matching comment at the final-commit call site
      lineOpacity: currentFillOpacity === '1' ? '1' : '0',
      lineWidth: '2.5',
      hidden: true,
      latex: '\\operatorname{polygon}\\left(' + poly.points.map((p) => '\\left(' + fmtNum(p[0]) + ',' + fmtNum(p[1]) + '\\right)').join(',') + '\\right)',
    }));

    // Desmos's setState only honors {left,right,bottom,top} for graph.viewport —
    // {xmin,xmax,ymin,ymax} is silently ignored (confirmed against the live API;
    // it does not throw, it just leaves the viewport at its default).
    const marginX = width * 0.08, marginY = height * 0.08;
    const viewport = { left: -marginX, right: width + marginX, bottom: -marginY, top: height + marginY };

    if (fourierMode) {
      drawFourierPreview(currentFourierPaths, width, height);
    } else {
      drawPreview(allBeziers, width, height);
    }

    if (calculator) {
      renderToDesmos(fillExpressions.concat(expressions), viewport);
    }

    const ms = Math.round(performance.now() - t0);
    const SEP = STATS_SEP;
    let statsHtml = fourierMode
      ? '[+] ' + currentFourierPaths.length + ' 路径' + SEP +
        '[+] ' + fourierHarmonicTotal + ' 谐波总数' + SEP +
        '[t] ' + ms + 'ms'
      : '[+] ' + edgeCount + ' 边缘像素' + SEP +
        '[+] ' + paths.length + ' 路径' + SEP +
        '[+] ' + allBeziers.length + ' 曲线' + SEP +
        '[t] ' + ms + 'ms';
    if (fillEnabled) {
      statsHtml += SEP + '[+] ' + fillPolygons.length + ' 填色';
      // regionsCapped specifically means the maxPolygons budget was hit --
      // NOT the same as (regionsAfterFilter > polygonCount), which also
      // trips on the rare degenerate-boundary case (a kept region traces to
      // under 3 points and gets skipped) and would misreport that as a cap.
      if (fillStats.regionsCapped > 0) {
        statsHtml += SEP + '<span class="cap">[!] 填色已截断至 ' + fillPolygons.length + '</span>';
      }
    }
    if (!fourierMode && capped) statsHtml += SEP + '<span class="cap">[!] 已截断至 ' + maxCurves + '</span>';
    lastStatsHtml = statsHtml;
    statsEl.innerHTML = statsHtml;

    if (fourierMode) {
      if (calculator && currentFourierPaths.length > 0) {
        drawBtn.disabled = false;
        startFourierDrawAnimation();
      }
    } else if (calculator && allBeziers.length > 0) {
      currentCurveCount = allBeziers.length;
      drawBtn.disabled = false;
      startDrawAnimation();
    } else {
      currentCurveCount = 0;
    }
  } catch (err) {
    console.error(err);
    statsEl.classList.add('err');
    statsEl.textContent = '[x] 出错: ' + err.message;
  } finally {
    isRendering = false;
    renderBtn.disabled = false;
  }
}

/* =========================================================================
 * Desmos bootstrap with a robust, timeout-guarded fallback to the canvas
 * preview if the API script fails to load or errors on construction.
 * ========================================================================= */

function waitForDesmos(timeoutMs) {
  return new Promise((resolve) => {
    const start = performance.now();
    (function poll() {
      if (window.__desmosLoaded && typeof Desmos !== 'undefined') { resolve(true); return; }
      if (window.__desmosFailed) { resolve(false); return; }
      if (performance.now() - start > timeoutMs) { resolve(false); return; }
      setTimeout(poll, 100);
    })();
  });
}

function showDesmosFailureNotice() {
  document.getElementById('calculator').style.display = 'none';
  previewWrap.classList.add('large');
  previewWrap.hidden = false;
  setCurveCollapsed(false);
}

// Found during testing: collapsing/expanding the expression panel (or any
// other resize of #calculator) can leave Desmos's own WebGL canvas
// blank -- the internal state is correct (confirmed: hidden flags and
// graphpaperBounds are all right immediately after), but the graph simply
// doesn't repaint at the new size until something else nudges it. A no-op
// setMathBounds() call (same value back in) is enough to force that
// repaint, so just do it on every #calculator resize rather than trying to
// special-case the panel's own toggle buttons.
function forceDesmosRepaint() {
  if (!calculator) return;
  const b = calculator.graphpaperBounds.mathCoordinates;
  calculator.setMathBounds({ left: b.left, right: b.right, bottom: b.bottom, top: b.top });
}

async function initDesmos() {
  const available = await waitForDesmos(6000);
  if (!available) { showDesmosFailureNotice(); return; }
  try {
    calculator = Desmos.GraphingCalculator(document.getElementById('calculator'), {
      settingsMenu: true,
      keypad: false,
    });
    new ResizeObserver(() => forceDesmosRepaint()).observe(calculatorEl);
  } catch (err) {
    console.error('Desmos construction failed', err);
    calculator = null;
    showDesmosFailureNotice();
  }
}

initDesmos();
</script>
</body>
</html>
